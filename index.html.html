<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивная рефлексия: Запуск нейро-двигателя</title>
    <!-- Google Fonts для современного вида -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --neon-yellow: #fefe33;
            --neon-red: #ff3131;
            --bg-deep: #02050a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Exo 2', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Анимированный космический фон */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #02050a 100%);
            z-index: -1;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.5;
            animation: pulse Star 3s infinite;
        }

        /* Режимы отображения */
        #participant-view, #organizer-view {
            display: none;
            width: 100%;
            min-height: 100vh;
        }

        .active { display: block !important; }

        /* --- СТИЛИ УЧАСТНИКА --- */
        .p-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        .header-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .sub-text {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .btn-go {
            padding: 20px 60px;
            font-size: 1.5rem;
            font-family: 'Orbitron', sans-serif;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            cursor: pointer;
            border-radius: 50px;
            box-shadow: 0 0 15px var(--neon-blue);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-go:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 40px var(--neon-blue);
        }

        .decor-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 50px;
        }

        .decor-img {
            width: 100%;
            border-radius: 15px;
            border: 1px solid var(--glass);
            padding: 10px;
            background: var(--glass);
        }

        /* Карточки вопросов */
        .q-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideIn 0.5s ease-out;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }

        .option-item {
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .option-item:hover {
            border-color: var(--neon-purple);
            background: rgba(188, 19, 254, 0.1);
            transform: scale(1.02);
        }

        .option-icon { font-size: 3rem; }

        /* Результаты */
        .result-img { font-size: 6rem; margin: 20px 0; display: block; }
        .btn-save {
            background: #ff8c00;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
        }

        /* --- СТИЛИ ОРГАНИЗАТОРА --- */
        .org-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .org-half {
            flex: 1;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass);
        }

        /* Левая часть: Океан и Острова */
        .ocean-bg {
            height: 100%;
            background: linear-gradient(180deg, #020b1a 0%, #051937 100%);
            position: relative;
        }

        .wave {
            position: absolute;
            bottom: 0; width: 200%; height: 100px;
            background: url('https://cdn-icons-png.flaticon.com/512/1057/1057413.png') repeat-x;
            opacity: 0.2;
            animation: waveMove 10s linear infinite;
        }

        .island {
            position: absolute;
            font-size: 4rem;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            animation: float 4s ease-in-out infinite;
        }

        .plane {
            position: absolute;
            bottom: 50px; left: 50%;
            transform: translateX(-50%);
            font-size: 8rem;
            animation: hoverPlane 3s ease-in-out infinite;
        }

        /* Правая часть: Приборная панель */
        .dashboard {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            background: rgba(0,0,0,0.5);
        }

        .counter-box {
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid var(--neon-blue);
        }

        .counter-val { font-family: 'Orbitron'; font-size: 3rem; color: var(--neon-blue); }

        /* Батарейка */
        .battery-wrap {
            width: 150px;
            height: 300px;
            border: 4px solid #444;
            border-radius: 10px;
            position: relative;
            margin: 20px auto;
            padding: 5px;
            display: flex;
            flex-direction: column-reverse;
        }

        .battery-segment {
            width: 100%;
            height: 0%;
            transition: 1s ease-in-out;
            border-radius: 3px;
        }

        /* Панель уровней */
        .level-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .level-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 10px;
        }

        /* Анимации */
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes waveMove { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        @keyframes hoverPlane { 0%, 100% { transform: translate(-50%, 0); } 50% { transform: translate(-50%, -15px); } }

    </style>
</head>
<body>

    <div class="space-bg" id="space"></div>

    <!-- РЕЖИМ УЧАСТНИКА -->
    <div id="participant-view" class="active">
        <div class="p-container" id="p-start">
            <h1 class="header-main">Интерактивная рефлексия: Запуск нейро-двигателя</h1>
            <br><br>
            <p class="sub-text">Для запуска нейро-двигателя, вам нужно ответить на вопросы</p>
            <button class="btn-go" onclick="startQuiz()">поехали</button>
            <div class="decor-grid">
                <span style="font-size: 4rem;">🧠</span>
                <span style="font-size: 4rem;">🛸</span>
                <span style="font-size: 4rem;">⚡</span>
                <span style="font-size: 4rem;">🤖</span>
            </div>
        </div>

        <div class="p-container" id="p-quiz" style="display:none;">
            <div id="q-content" class="q-card">
                <!-- Контент вопроса -->
            </div>
        </div>

        <div class="p-container" id="p-result" style="display:none;">
            <div class="q-card">
                <h2 style="font-family: 'Orbitron';">Ваше состояние по итогу кейс-сессии:</h2>
                <h3 id="res-category" style="margin:15px 0; color:var(--neon-purple); font-size:2rem;"></h3>
                <span id="res-emoji" class="result-img"></span>
                <p id="res-desc" style="line-height:1.6;"></p>
                <button class="btn-save" onclick="submitResult()">Записать ответ</button>
            </div>
        </div>
    </div>

    <!-- РЕЖИМ ОРГАНИЗАТОРА -->
    <div id="organizer-view">
        <div class="org-layout">
            <!-- Левая часть -->
            <div class="org-half">
                <div class="ocean-bg">
                    <div class="wave"></div>
                    <!-- 5 Нейро-островов -->
                    <div class="island" style="top:15%; left:10%;">🏝️⚙️</div>
                    <div class="island" style="top:25%; left:60%;">🏝️🔌</div>
                    <div class="island" style="top:50%; left:30%;">🏝️📡</div>
                    <div class="island" style="top:10%; left:40%;">🏝️🛠️</div>
                    <div class="island" style="top:60%; left:75%;">🏝️🔋</div>
                    <div class="plane">🛩️</div>
                </div>
            </div>
            <!-- Правая часть -->
            <div class="org-half dashboard">
                <div class="counter-box">
                    <p>Количество пассажиров на борту</p>
                    <div class="counter-val" id="total-count">0</div>
                </div>

                <div style="text-align: center;">
                    <p>Индикатор нейро-двигателя</p>
                    <div class="battery-wrap">
                        <div id="bat-red" class="battery-segment" style="background: var(--neon-red); box-shadow: 0 0 15px var(--neon-red);"></div>
                        <div id="bat-yellow" class="battery-segment" style="background: var(--neon-yellow); box-shadow: 0 0 15px var(--neon-yellow);"></div>
                        <div id="bat-green" class="battery-segment" style="background: var(--neon-green); box-shadow: 0 0 15px var(--neon-green);"></div>
                    </div>
                </div>

                <div class="level-stats">
                    <h3>Уровень участников</h3>
                    <div class="level-row"><span>🐌 Улитка</span> <span id="stat-low">0</span></div>
                    <div class="level-row"><span>🦜 Попугай</span> <span id="stat-mid">0</span></div>
                    <div class="level-row"><span>🦅 Орел</span> <span id="stat-high">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ДАННЫЕ И ЛОГИКА ---
        const questions = [
            {
                q: "Ваше общее впечатление от кейс-сессии?",
                options: [
                    { t: "Полный восторг и заряд!", b: 3, img: "🤩" },
                    { t: "Все прошло ровно", b: 2, img: "😐" },
                    { t: "Ожидал большего", b: 1, img: "😴" }
                ]
            },
            {
                q: "Доступность и прозрачность контента?",
                options: [
                    { t: "Все предельно ясно", b: 3, img: "💡" },
                    { t: "Есть над чем подумать", b: 2, img: "🤔" },
                    { t: "Сложно для понимания", b: 1, img: "🔒" }
                ]
            },
            {
                q: "Ваш психологический комфорт во время организации кейс-сессии?",
                options: [
                    { t: "Атмосфера уюта и тепла", b: 3, img: "☕" },
                    { t: "Было жарко и активно", b: 2, img: "🔥" },
                    { t: "Чувствовалась прохлада", b: 1, img: "⛈️" }
                ]
            },
            {
                q: "Ваша вовлеченность в процесс работы в рамках кейс-сессии?",
                options: [
                    { t: "Видел каждую деталь", b: 3, img: "🔭" },
                    { t: "Следил за общим ритмом, но иногда отставал", b: 2, img: "🐺" },
                    { t: "Потеря сигнала", b: 1, img: "💤" }
                ]
            },
            {
                q: "Ваша готовность применять полученные знания на практике?",
                options: [
                    { t: "Готов взлететь прямо сейчас", b: 3, img: "☀️" },
                    { t: "Нужно подготовить почву", b: 2, img: "🌱" },
                    { t: "дверь пока закрыта", b: 1, img: "🚪" }
                ]
            }
        ];

        let currentQ = 0;
        let userScore = 0;

        function startQuiz() {
            document.getElementById('p-start').style.display = 'none';
            document.getElementById('p-quiz').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            const data = questions[currentQ];
            let html = `<h2 style="margin-bottom:20px;">${data.q}</h2><div class="options-container">`;
            data.options.forEach((opt, index) => {
                html += `
                    <div class="option-item" onclick="handleAnswer(${opt.b})">
                        <span class="option-icon">${opt.img}</span>
                        <span>${opt.t}</span>
                    </div>
                `;
            });
            html += `</div>`;
            document.getElementById('q-content').innerHTML = html;
        }

        function handleAnswer(points) {
            userScore += points;
            currentQ++;
            if (currentQ < questions.length) {
                renderQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            document.getElementById('p-quiz').style.display = 'none';
            document.getElementById('p-result').style.display = 'block';

            let cat = "", img = "", desc = "", id = "";
            if (userScore >= 13) {
                cat = "Орел в небесах"; id = "high";
                img = "🦅";
                desc = "Вы почувствовали себя величественным и вдохновляющим существом! Семинар открыл перед вами новые горизонты и возможности. Ваша энергия бурлит, и теперь вы готовы высоко взлететь к новым вершинам! Ваша задача – найти способ приземлиться аккуратно и при этом не задеть ни одного из слушателей.";
            } else if (userScore >= 8) {
                cat = "Попугай на ветке"; id = "mid";
                img = "🦜";
                desc = "Вы живо обсуждали семинар с коллегами и даже придавали ему свои яркие оттенки! Вы были вовлечены, весело болтали и иногда 'подсвистывали' на тему актуальных вопросов. Но, по правде, вы мечтаете об удобном кресле и кофе покрепче – чтобы обсудить всё в более «комфортном» формате..";
            } else {
                cat = "Улитка на солнце"; id = "low";
                img = "🐌";
                desc = "Вы воспринимаете семинар как спокойную прогулку в теплый день. Вам было приятно, но вы предпочли бы, чтобы всё происходило немного медленнее и с большим количеством тени.";
            }

            document.getElementById('res-category').innerText = cat;
            document.getElementById('res-emoji').innerText = img;
            document.getElementById('res-desc').innerText = desc;
            window.lastResultId = id;
        }

        function submitResult() {
            const stats = JSON.parse(localStorage.getItem('neuro_data') || '{"low":0,"mid":0,"high":0,"total":0}');
            stats[window.lastResultId]++;
            stats.total++;
            localStorage.setItem('neuro_data', JSON.stringify(stats));
            alert("Ваш сигнал принят бортовым компьютером!");
            location.reload();
        }

        // --- ЛОГИКА ОРГАНИЗАТОРА ---
        function updateOrganizer() {
            const stats = JSON.parse(localStorage.getItem('neuro_data') || '{"low":0,"mid":0,"high":0,"total":0}');
            document.getElementById('total-count').innerText = stats.total;
            document.getElementById('stat-low').innerText = stats.low;
            document.getElementById('stat-mid').innerText = stats.mid;
            document.getElementById('stat-high').innerText = stats.high;

            if (stats.total > 0) {
                document.getElementById('bat-red').style.height = (stats.low / stats.total * 100) + "%";
                document.getElementById('bat-yellow').style.height = (stats.mid / stats.total * 100) + "%";
                document.getElementById('bat-green').style.height = (stats.high / stats.total * 100) + "%";
            }
        }

        // Переключение режимов
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a' || e.key.toLowerCase() === 'ф') {
                document.getElementById('participant-view').classList.toggle('active');
                document.getElementById('organizer-view').classList.toggle('active');
                updateOrganizer();
            }
            if (e.key.toLowerCase() === 'r' || e.key.toLowerCase() === 'к') {
                if(confirm("Очистить данные рефлексии?")) {
                    localStorage.removeItem('neuro_data');
                    updateOrganizer();
                }
            }
        });

        // Отслеживание изменений из других вкладок
        window.addEventListener('storage', updateOrganizer);

        // Создание звездного фона
        const space = document.getElementById('space');
        for(let i=0; i<100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            space.appendChild(star);
        }
    </script>
</body>
</html>
